name: release

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  container:
    if: ${{ github.repository == 'tarik02/t3code-gateway' && contains(github.event.head_commit.message, 'version packages') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: pnpm

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm package:runtime

      - id: version
        run: |
          version="$(node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync('packages/contracts/package.json', 'utf8')).version)")"
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/bake-action@v6
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ steps.version.outputs.version }}
        with:
          files: docker-bake.hcl
          push: true
