name: ci

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.24.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm fmt:check

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm build
